<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş — Developardus IoT</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">
        <div class="logo-icon">D</div>
        <h2>Developardus IoT</h2>
        <p>Tank Monitör Sunucusu</p>
      </div>

      <div id="loginForm">
        <div class="form-group">
          <label class="form-label">E-posta</label>
          <input type="email" id="email" class="form-input" placeholder="admin@developardus.com" autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Şifre</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" style="width:100%;height:44px;margin-top:8px;font-size:14px;" onclick="doLogin()">
          Giriş Yap
        </button>
        <p id="loginError" style="color:var(--danger);font-size:13px;text-align:center;margin-top:12px;display:none;"></p>
      </div>

      <div style="text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
        <p style="font-size:12px;color:var(--t4);">
          İlk kurulum? <a href="#" onclick="showRegister()" style="color:var(--accent);text-decoration:none;">Hesap oluştur</a>
        </p>
      </div>

      <div id="registerForm" style="display:none;">
        <div class="form-group">
          <label class="form-label">Kullanıcı Adı</label>
          <input type="text" id="regUsername" class="form-input" placeholder="admin">
        </div>
        <div class="form-group">
          <label class="form-label">E-posta</label>
          <input type="email" id="regEmail" class="form-input" placeholder="admin@developardus.com">
        </div>
        <div class="form-group">
          <label class="form-label">Şifre</label>
          <input type="password" id="regPassword" class="form-input" placeholder="En az 6 karakter">
        </div>
        <button class="btn btn-primary" style="width:100%;height:44px;margin-top:8px;" onclick="doRegister()">
          Kayıt Ol
        </button>
        <p style="text-align:center;margin-top:12px;">
          <a href="#" onclick="showLogin()" style="color:var(--accent);font-size:13px;text-decoration:none;">← Giriş'e dön</a>
        </p>
      </div>
    </div>
  </div>

  <div class="toast" id="globalToast"></div>

  <script src="/js/app.js"></script>
  <script>
    // Zaten giriş yapmışsa yönlendir
    if (getSession()) window.location.href = '/';

    function showRegister() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
    }
    function showLogin() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
    }

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';

      if (!email || !password) {
        errEl.textContent = 'E-posta ve şifre gerekli.';
        errEl.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'login', email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Giriş başarısız';
          errEl.style.display = 'block';
          return;
        }

        localStorage.setItem('dev_session', JSON.stringify(data.session));
        localStorage.setItem('dev_user', JSON.stringify(data.user));
        window.location.href = '/';

      } catch (e) {
        errEl.textContent = 'Bağlantı hatası: ' + e.message;
        errEl.style.display = 'block';
      }
    }

    async function doRegister() {
      const username = document.getElementById('regUsername').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;

      if (!username || !email || !password) {
        showToast('Tüm alanları doldurun.', 'error');
        return;
      }

      if (password.length < 6) {
        showToast('Şifre en az 6 karakter olmalı.', 'error');
        return;
      }

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'register', email, password, username, role: 'admin' })
        });

        const data = await res.json();

        if (!res.ok) {
          showToast(data.error || 'Kayıt başarısız', 'error');
          return;
        }

        showToast('Hesap oluşturuldu! Giriş yapabilirsiniz.', 'success');
        showLogin();
        document.getElementById('email').value = email;

      } catch (e) {
        showToast('Bağlantı hatası: ' + e.message, 'error');
      }
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (document.getElementById('loginForm').style.display !== 'none') {
          doLogin();
        } else {
          doRegister();
        }
      }
    });
  </script>
</body>
</html>
