<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Developardus IoT</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <div class="shell">
    <div id="sidebarMount"></div>
    <div class="main">
      <div id="topbarMount"></div>
      <div class="content">

        <!-- Stats -->
        <div class="stats-grid fade-in" id="statsGrid">
          <div class="stat-box accent">
            <div class="stat-label">Aktif Cihaz</div>
            <div class="stat-value" id="statDevices">—</div>
            <div class="stat-sub" id="statDevicesSub">yükleniyor...</div>
          </div>
          <div class="stat-box info">
            <div class="stat-label">Bugünkü Okuma</div>
            <div class="stat-value" id="statReadings">—</div>
            <div class="stat-sub" id="statReadingsSub"></div>
          </div>
          <div class="stat-box warn">
            <div class="stat-label">Aktif Alarm</div>
            <div class="stat-value" id="statAlerts">—</div>
            <div class="stat-sub" id="statAlertsSub"></div>
          </div>
          <div class="stat-box danger">
            <div class="stat-label">Çevrimdışı</div>
            <div class="stat-value" id="statOffline">—</div>
            <div class="stat-sub" id="statOfflineSub"></div>
          </div>
        </div>

        <!-- Devices -->
        <div class="card fade-in stagger-2" style="margin-bottom:24px;">
          <div class="card-header">
            <div class="card-title">▧ Cihaz Durumu</div>
            <button class="btn btn-primary btn-sm" onclick="openAddDevice()">+ Cihaz Ekle</button>
          </div>
          <div class="card-body" id="devicesArea">
            <div class="empty"><div class="empty-icon">◌</div><p>Cihazlar yükleniyor...</p></div>
          </div>
        </div>

        <!-- Chart + Recent Alerts -->
        <div class="grid-2 fade-in stagger-3">
          <div class="card">
            <div class="card-header">
              <div class="card-title">📊 Son 24 Saat Trend</div>
            </div>
            <div class="card-body">
              <div class="chart-container">
                <canvas id="trendChart"></canvas>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <div class="card-title">⚠ Son Alarmlar</div>
              <a href="/system.html" class="btn btn-ghost btn-sm">Tümü →</a>
            </div>
            <div class="card-body no-pad">
              <div class="table-wrap">
                <table>
                  <thead><tr><th>Zaman</th><th>Cihaz</th><th>Tip</th><th>Mesaj</th></tr></thead>
                  <tbody id="alertsBody">
                    <tr><td colspan="4" class="empty" style="padding:24px;">Yükleniyor...</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Device Modal -->
  <div class="modal-overlay" id="addDeviceModal">
    <div class="modal">
      <div class="modal-title">Yeni Cihaz Ekle</div>
      <div class="form-group">
        <label class="form-label">Cihaz ID</label>
        <input type="text" id="newDeviceId" class="form-input" placeholder="TANK-003">
      </div>
      <div class="form-group">
        <label class="form-label">Cihaz Adı</label>
        <input type="text" id="newDeviceName" class="form-input" placeholder="Yeni Tank">
      </div>
      <div class="form-group">
        <label class="form-label">Tank Yüksekliği (cm)</label>
        <input type="number" id="newTankHeight" class="form-input" placeholder="200" value="200">
      </div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button class="btn btn-primary" onclick="addDevice()">Kaydet</button>
        <button class="btn btn-ghost" onclick="closeAddDevice()">İptal</button>
      </div>
      <div id="newDeviceResult" style="margin-top:16px;display:none;"></div>
    </div>
  </div>

  <div class="toast" id="globalToast"></div>

  <script src="/js/app.js"></script>
  <script>
    if (!initPage('dashboard', 'Dashboard')) throw 'auth';

    let trendChart = null;

    async function loadPageData() {
      await Promise.all([loadStats(), loadDevices(), loadAlerts(), loadTrend()]);
    }

    // ── Stats ──
    async function loadStats() {
      try {
        const res = await fetch('/api/health');
        const data = await res.json();

        document.getElementById('statDevices').textContent = data.active_devices || 0;
        document.getElementById('statDevicesSub').textContent = `${data.offline_devices?.length || 0} çevrimdışı`;
        document.getElementById('statReadings').textContent = data.stats?.readings_today || 0;
        document.getElementById('statReadingsSub').textContent = `toplam: ${data.stats?.readings_count || 0}`;
        document.getElementById('statAlerts').textContent = data.active_alerts || 0;
        document.getElementById('statAlertsSub').textContent = `bugün: ${data.stats?.alerts_today || 0}`;
        document.getElementById('statOffline').textContent = data.offline_devices?.length || 0;

        const offNames = (data.offline_devices || []).map(d => d.name || d.device_id).slice(0, 3).join(', ');
        document.getElementById('statOfflineSub').textContent = offNames || 'hepsi çevrimiçi';

      } catch (e) {
        console.error('Stats error:', e);
      }
    }

    // ── Devices ──
    async function loadDevices() {
      try {
        const res = await fetch('/api/devices?active_only=true');
        const { data: devices } = await res.json();
        const area = document.getElementById('devicesArea');

        if (!devices?.length) {
          area.innerHTML = `<div class="empty"><div class="empty-icon">◌</div><p>Henüz cihaz yok. Yukarıdaki "Cihaz Ekle" butonuyla başlayın.</p></div>`;
          return;
        }

        area.innerHTML = `<div class="devices-grid">${devices.map(d => {
          const online = isOnline(d.last_seen);
          const lr = d.latest_reading;
          const pct = lr?.level_percent ?? '—';
          const temp = lr?.temperature != null ? `${lr.temperature}°C` : '—';
          const batt = lr?.battery_voltage != null ? `${lr.battery_voltage}V` : '—';

          return `
            <div class="device-card" onclick="window.location.href='/tank.html?id=${d.device_id}'">
              ${typeof pct === 'number' ? createTankBar(pct) : '<div class="tank-bar-wrap"><div class="tank-bar-label">—</div></div>'}
              <div class="device-info">
                <div class="device-name">
                  <span class="dot ${online ? 'dot-ok' : 'dot-offline'}" style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;"></span>
                  ${d.name || d.device_id}
                </div>
                <div class="device-meta">
                  <span>📟 ${d.device_id}</span>
                  <span>🕐 ${timeAgo(d.last_seen)}</span>
                  <span>🌡 ${temp}</span>
                  <span>🔋 ${batt}</span>
                </div>
                <div style="margin-top:8px;">
                  <span class="tag ${online ? 'tag-ok' : 'tag-offline'}">${online ? 'Çevrimiçi' : 'Çevrimdışı'}</span>
                  ${typeof pct === 'number' ? `<span class="tag ${pct <= 10 ? 'tag-danger' : pct <= 25 ? 'tag-warn' : 'tag-ok'}">${pct}%</span>` : ''}
                </div>
              </div>
            </div>`;
        }).join('')}</div>`;

      } catch (e) {
        console.error('Devices error:', e);
      }
    }

    // ── Alerts ──
    async function loadAlerts() {
      try {
        const { data } = await sb
          .from('alerts')
          .select('*')
          .eq('acknowledged', false)
          .order('created_at', { ascending: false })
          .limit(8);

        const tbody = document.getElementById('alertsBody');
        if (!data?.length) {
          tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--t4);">Aktif alarm yok ✓</td></tr>`;
          return;
        }

        const typeMap = { low_level: 'tag-danger', high_level: 'tag-warn', battery_low: 'tag-warn', offline: 'tag-offline', temp_high: 'tag-danger' };

        tbody.innerHTML = data.map(a => `
          <tr>
            <td class="mono" style="font-size:12px;">${formatDate(a.created_at)}</td>
            <td class="mono">${a.device_id}</td>
            <td><span class="tag ${typeMap[a.alert_type] || 'tag-warn'}">${a.alert_type}</span></td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;font-size:12px;">${a.message || '—'}</td>
          </tr>
        `).join('');

      } catch (e) {
        console.error('Alerts error:', e);
      }
    }

    // ── Trend Chart ──
    async function loadTrend() {
      try {
        const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
        const { data } = await sb
          .from('readings')
          .select('device_id, level_percent, temperature, created_at')
          .gte('created_at', since)
          .order('created_at', { ascending: true })
          .limit(500);

        if (!data?.length) return;

        // Group by device
        const byDevice = {};
        data.forEach(r => {
          if (!byDevice[r.device_id]) byDevice[r.device_id] = [];
          byDevice[r.device_id].push(r);
        });

        const colors = ['#22d3a7', '#3b82f6', '#f59e0b', '#ef4444', '#a855f7', '#ec4899'];
        const datasets = Object.entries(byDevice).map(([devId, readings], i) => ({
          label: devId,
          data: readings.map(r => ({ x: new Date(r.created_at), y: r.level_percent })),
          borderColor: colors[i % colors.length],
          backgroundColor: colors[i % colors.length] + '15',
          borderWidth: 2,
          fill: true,
          tension: 0.3,
          pointRadius: 0
        }));

        const ctx = document.getElementById('trendChart');
        if (trendChart) trendChart.destroy();

        trendChart = new Chart(ctx, {
          type: 'line',
          data: { datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { labels: { color: '#94a3b8', font: { family: 'IBM Plex Mono', size: 11 } } }
            },
            scales: {
              x: {
                type: 'time',
                time: { unit: 'hour', displayFormats: { hour: 'HH:mm' } },
                grid: { color: 'rgba(148,163,184,0.06)' },
                ticks: { color: '#64748b', font: { size: 11 } }
              },
              y: {
                min: 0, max: 100,
                grid: { color: 'rgba(148,163,184,0.06)' },
                ticks: { color: '#64748b', callback: v => v + '%' }
              }
            }
          }
        });

      } catch (e) {
        console.error('Trend error:', e);
      }
    }

    // ── Add Device ──
    function openAddDevice() { document.getElementById('addDeviceModal').classList.add('open'); }
    function closeAddDevice() {
      document.getElementById('addDeviceModal').classList.remove('open');
      document.getElementById('newDeviceResult').style.display = 'none';
    }

    async function addDevice() {
      const device_id = document.getElementById('newDeviceId').value.trim().toUpperCase();
      const name = document.getElementById('newDeviceName').value.trim();
      const tank_height_cm = parseInt(document.getElementById('newTankHeight').value) || 200;

      if (!device_id) { showToast('Cihaz ID gerekli', 'error'); return; }

      try {
        const res = await fetch('/api/devices', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ device_id, name, tank_height_cm })
        });
        const data = await res.json();

        if (!res.ok) { showToast(data.error, 'error'); return; }

        const resultEl = document.getElementById('newDeviceResult');
        resultEl.style.display = 'block';
        resultEl.innerHTML = `
          <div style="background:var(--bg-3);padding:14px;border-radius:var(--r-sm);border:1px solid var(--border-accent);">
            <div style="font-size:12px;color:var(--t3);margin-bottom:4px;">API Key (bunu cihaza yükleyin):</div>
            <code style="font-family:var(--mono);font-size:13px;color:var(--accent);word-break:break-all;">${data.api_key}</code>
          </div>`;

        showToast(`${device_id} eklendi!`, 'success');
        loadPageData();

      } catch (e) {
        showToast('Hata: ' + e.message, 'error');
      }
    }

    // ── Auto-refresh ──
    loadPageData();
    setInterval(loadPageData, 30000);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
</body>
</html>
